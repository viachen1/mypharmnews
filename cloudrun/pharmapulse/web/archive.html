<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史归档 - PharmaPulse</title>
  <link rel="stylesheet" href="/web/css/style.css">
</head>
<body>

  <!-- 顶部导航 -->
  <header class="header">
    <div class="container header-inner">
      <a href="/web/index.html" class="logo">
        <span class="logo-icon">💊</span>
        <span class="logo-text">PharmaPulse</span>
      </a>
      <nav class="nav">
        <a href="/web/index.html" class="nav-link">今日日报</a>
        <a href="/web/literature.html" class="nav-link">文献检索</a>
        <a href="/web/archive.html" class="nav-link active">历史归档</a>
        <a href="/web/about.html" class="nav-link">关于</a>
      </nav>
      <div class="header-actions">
        <button class="btn-theme-toggle" id="themeToggle" title="切换暗色/亮色模式" aria-label="切换主题">🌓</button>
        <a href="/web/subscribe.html" class="btn btn-subscribe">订阅日报</a>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="/web/index.html" class="nav-link">今日日报</a>
      <a href="/web/literature.html" class="nav-link">文献检索</a>
      <a href="/web/archive.html" class="nav-link active">历史归档</a>
      <a href="/web/about.html" class="nav-link">关于</a>
      <a href="/web/subscribe.html" class="nav-link">订阅日报</a>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <section class="archive-section">
        <h1 class="archive-title">📚 历史归档</h1>
        <p class="archive-desc">浏览历史日报，选择日期查看当日医药行业资讯</p>

        <div class="archive-date-input">
          <input type="date" id="archiveDate">
          <button class="btn-primary" id="archiveGoBtn">查看日报</button>
        </div>

        <h3 style="margin-bottom: 16px; color: var(--primary);">
          历史日期
          <span id="archiveCount" style="font-size: 0.85rem; font-weight: 400; color: var(--text-muted); margin-left: 8px;"></span>
        </h3>
        <div class="archive-list" id="archiveList">
          <p style="color: var(--text-muted);">正在加载索引...</p>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="logo-icon">💊</span>
        <span class="footer-name">PharmaPulse</span>
        <p class="footer-desc">医药行业全球动向每日新闻推送</p>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 PharmaPulse. 数据来源为公开资讯，仅供参考。</p>
      </div>
    </div>
  </footer>

  <script>
    (function () {
      var mobileMenuBtn = document.getElementById("mobileMenuBtn");
      var mobileMenu = document.getElementById("mobileMenu");
      if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener("click", function () {
          mobileMenu.classList.toggle("show");
        });
      }

      var archiveDate = document.getElementById("archiveDate");
      var archiveGoBtn = document.getElementById("archiveGoBtn");
      var archiveList = document.getElementById("archiveList");
      var archiveCount = document.getElementById("archiveCount");

      // 设置默认日期为今天
      var now = new Date();
      var utc8 = new Date(now.getTime() + 8 * 3600 * 1000);
      var today = utc8.toISOString().slice(0, 10);
      if (archiveDate) archiveDate.value = today;

      // 手动跳转按钮
      if (archiveGoBtn) {
        archiveGoBtn.addEventListener("click", function () {
          var d = archiveDate.value;
          if (d) window.location.href = "/web/index.html?date=" + d;
        });
      }

      // 从 index.json 加载可用日期列表
      fetch("/data/index.json")
        .then(function (resp) {
          if (!resp.ok) throw new Error("HTTP " + resp.status);
          return resp.json();
        })
        .then(function (indexData) {
          renderArchiveList(indexData);
        })
        .catch(function (err) {
          console.warn("索引加载失败，回退到逐个扫描:", err.message);
          fallbackScan();
        });

      function renderArchiveList(indexData) {
        var dates = indexData.dates || [];

        if (archiveCount) {
          archiveCount.textContent = "共 " + dates.length + " 天";
        }

        if (dates.length === 0) {
          archiveList.innerHTML = '<p style="color: var(--text-muted);">暂无历史数据</p>';
          return;
        }

        archiveList.innerHTML = dates
          .map(function (entry) {
            var date = entry.date;
            var total = entry.total || 0;
            var stats = entry.stats || {};
            var byCategory = stats.by_category || {};

            var reg = byCategory.regulatory || 0;
            var cli = byCategory.clinical || 0;
            var cor = byCategory.corporate || 0;
            var mkt = byCategory.market || 0;

            // 格式化日期为中文
            var d = new Date(date + "T00:00:00");
            var weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
            var displayDate = (d.getMonth() + 1) + "月" + d.getDate() + "日 " + weekdays[d.getDay()];

            return (
              '<a href="/web/index.html?date=' + date + '" class="archive-item">' +
                '<div>' +
                  '<span class="archive-item-date">' + date + '</span>' +
                  '<span style="font-size:0.8rem; color:var(--text-muted); margin-left:8px;">' + displayDate + '</span>' +
                '</div>' +
                '<div class="archive-item-stats">' +
                  '<span class="archive-item-total">' + total + ' 条资讯</span>' +
                  '<span class="archive-item-breakdown">' +
                    '📋' + reg + ' 🔬' + cli + ' 🏢' + cor + ' 📈' + mkt +
                  '</span>' +
                '</div>' +
              '</a>'
            );
          })
          .join("");
      }

      // 回退方案: 逐个扫描最近30天的数据文件
      function fallbackScan() {
        var dates = [];
        for (var i = 0; i < 30; i++) {
          var d = new Date(utc8.getTime() - i * 86400000);
          dates.push(d.toISOString().slice(0, 10));
        }

        var found = [];
        var checked = 0;

        dates.forEach(function (dateStr) {
          fetch("/data/" + dateStr + ".json", { method: "HEAD" })
            .then(function (resp) {
              if (resp.ok) found.push(dateStr);
            })
            .catch(function () {})
            .finally(function () {
              checked++;
              if (checked === dates.length) {
                found.sort().reverse();
                if (archiveCount) archiveCount.textContent = "共 " + found.length + " 天";
                if (found.length === 0) {
                  archiveList.innerHTML = '<p style="color: var(--text-muted);">暂无历史数据</p>';
                  return;
                }
                archiveList.innerHTML = found
                  .map(function (d) {
                    return (
                      '<a href="/web/index.html?date=' + d + '" class="archive-item">' +
                        '<span class="archive-item-date">' + d + "</span>" +
                        '<span class="archive-item-count">查看日报 →</span>' +
                      "</a>"
                    );
                  })
                  .join("");
              }
            });
        });
      }
    })();
  </script>
  <script>
    // 暗色模式
    (function(){
      var t=localStorage.getItem('pp-theme')||'light';
      document.documentElement.setAttribute('data-theme',t);
      var btn=document.getElementById('themeToggle');
      if(btn){btn.textContent=t==='dark'?'☀️':'🌓';btn.addEventListener('click',function(){var c=document.documentElement.getAttribute('data-theme')||'light';var n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('pp-theme',n);btn.textContent=n==='dark'?'☀️':'🌓';});}
    })();
  </script>
</body>
</html>
